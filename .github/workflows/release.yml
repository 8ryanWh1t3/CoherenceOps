name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');

            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            // Extract section for this version
            const escaped = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(
              `## \\[${escaped}\\][^\\n]*\\n([\\s\\S]*?)(?=## \\[|$)`
            );
            const match = changelog.match(regex);
            const body = match ? match[1].trim() : 'See CHANGELOG.md for details.';

            core.setOutput('body', body);
            core.setOutput('tag', tag);

      - name: Create GitHub Release
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_TAG: ${{ steps.changelog.outputs.tag }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;

            await github.rest.repos.createRelease({
              owner, repo,
              tag_name: tag,
              name: `CoherenceOps ${tag}`,
              body,
              draft: false,
              prerelease: false,
            });
            core.info(`Created release: ${tag}`);
